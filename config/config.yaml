app:
  name: seckill
  env: dev

server:
  port: 8080
  read_timeout: 3s
  write_timeout: 3s
  shutdown_timeout: 5s

mysql:
  host: 127.0.0.1
  port: 3306
  user: root
  password: "123456"
  db_name: seckill
  max_open_conns: 50
  max_idle_conns: 10
  conn_max_lifetime: 300

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0
  pool_size: 20
  min_idle_conns: 5

rocketmq:
  name_servers:
    - 127.0.0.1:9876
  topic: seckill_order
  group_prefix: seckill

jwt:
  secret: "change-me-in-prod"
  expire: 24h
  issuer: seckill
  seckill_expire: 5m

log:
  level: info
